<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Bita - Belajar Membaca">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <radialGradient id="body" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#fed7aa"/>
      <stop offset="60%"  stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
    <radialGradient id="ear" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Ears -->
  <ellipse cx="20" cy="22" rx="6" ry="7" fill="url(#ear)"/>
  <ellipse cx="44" cy="22" rx="6" ry="7" fill="url(#ear)"/>
  <ellipse cx="20" cy="24" rx="3" ry="4" fill="#f9a8d4"/>
  <ellipse cx="44" cy="24" rx="3" ry="4" fill="#f9a8d4"/>

  <!-- Body / head -->
  <ellipse cx="32" cy="38" rx="22" ry="21" fill="url(#body)"/>

  <!-- Cheeks -->
  <ellipse cx="18" cy="44" rx="4" ry="2.5" fill="#f9a8d4" opacity="0.85"/>
  <ellipse cx="46" cy="44" rx="4" ry="2.5" fill="#f9a8d4" opacity="0.85"/>

  <!-- Eyes — closed happy crescents (^_^) -->
  <path d="M 22 36 Q 25 32 28 36" stroke="#0f172a" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M 36 36 Q 39 32 42 36" stroke="#0f172a" stroke-width="2.4" fill="none" stroke-linecap="round"/>

  <!-- Mouth -->
  <path d="M 27 45 Q 32 49 37 45" stroke="#0f172a" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
