<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Belajar Membaca - Yuk Bisa Baca!">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fef3c7"/>
      <stop offset="50%"  stop-color="#fecaca"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#e11d48"/>
      <stop offset="50%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="55%"  stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>

  <!-- Floating decorations -->
  <text x="80"   y="120" font-size="64" opacity="0.85">⭐</text>
  <text x="1080" y="180" font-size="80" opacity="0.85">🌈</text>
  <text x="120"  y="540" font-size="80" opacity="0.85">☁️</text>
  <text x="1060" y="540" font-size="64" opacity="0.85">🎈</text>
  <text x="1130" y="430" font-size="48" opacity="0.85">✨</text>
  <text x="60"   y="370" font-size="48" opacity="0.85">🌟</text>

  <!-- Logo badge -->
  <g transform="translate(120 230)" filter="url(#soft)">
    <rect x="0" y="0" width="160" height="160" rx="36" ry="36" fill="url(#badge)"/>
    <text x="50" y="118" text-anchor="middle" font-size="92"
          font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-weight="900" fill="#ffffff">A</text>
    <text x="115" y="118" text-anchor="middle" font-size="68"
          font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-weight="900" fill="#ffffff">a</text>
  </g>

  <!-- Title -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-weight="900" filter="url(#soft)">
    <text x="320" y="290" font-size="86" fill="#1f2937">Yuk, Belajar</text>
    <text x="320" y="386" font-size="120" fill="url(#title)">Membaca!</text>
  </g>

  <!-- Subtitle -->
  <text x="320" y="448" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-weight="600" font-size="34" fill="#475569">
    Huruf · Suku Kata · Kata · Kalimat
  </text>

  <!-- Footer pill -->
  <g transform="translate(320 500)">
    <rect x="0" y="0" width="430" height="58" rx="29" fill="#ffffff" opacity="0.85"/>
    <text x="28" y="38" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="700" font-size="24" fill="#334155">
      📚  Untuk anak Indonesia · Suara bahasa Indonesia
    </text>
  </g>
</svg>
