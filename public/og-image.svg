<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Belajar Membaca - Yuk Bisa Baca!">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fef3c7"/>
      <stop offset="50%"  stop-color="#fecaca"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#e11d48"/>
      <stop offset="50%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="bitaBody" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#fed7aa"/>
      <stop offset="60%"  stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
    <radialGradient id="bitaEar" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>

  <!-- Floating decorations -->
  <text x="80"   y="120" font-size="64" opacity="0.85">⭐</text>
  <text x="1080" y="180" font-size="80" opacity="0.85">🌈</text>
  <text x="120"  y="540" font-size="80" opacity="0.85">☁️</text>
  <text x="1060" y="540" font-size="64" opacity="0.85">🎈</text>
  <text x="1130" y="430" font-size="48" opacity="0.85">✨</text>
  <text x="60"   y="370" font-size="48" opacity="0.85">🌟</text>

  <!-- Bita mascot (cheer pose) — left side -->
  <g transform="translate(140 220)" filter="url(#soft)">
    <!-- Hands -->
    <ellipse cx="32"  cy="92"  rx="14" ry="12" fill="url(#bitaEar)"/>
    <ellipse cx="168" cy="92"  rx="14" ry="12" fill="url(#bitaEar)"/>
    <!-- Ears -->
    <ellipse cx="55"  cy="58" rx="22" ry="26" fill="url(#bitaEar)"/>
    <ellipse cx="145" cy="58" rx="22" ry="26" fill="url(#bitaEar)"/>
    <ellipse cx="55"  cy="62" rx="11" ry="14" fill="#f9a8d4"/>
    <ellipse cx="145" cy="62" rx="11" ry="14" fill="#f9a8d4"/>
    <!-- Body -->
    <ellipse cx="100" cy="115" rx="78" ry="72" fill="url(#bitaBody)"/>
    <!-- Cheeks -->
    <ellipse cx="55"  cy="130" rx="14" ry="9" fill="#f9a8d4" opacity="0.75"/>
    <ellipse cx="145" cy="130" rx="14" ry="9" fill="#f9a8d4" opacity="0.75"/>
    <!-- Eyes — happy crescents -->
    <path d="M 68 108 Q 78 96 88 108"   stroke="#0f172a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 112 108 Q 122 96 132 108" stroke="#0f172a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Mouth (cheer) -->
    <path d="M 75 132 Q 100 162 125 132 Q 100 152 75 132 Z" fill="#0f172a"/>
    <ellipse cx="100" cy="148" rx="11" ry="5" fill="#fb7185"/>
  </g>

  <!-- Title -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-weight="900" filter="url(#soft)">
    <text x="380" y="290" font-size="86" fill="#1f2937">Yuk, Belajar</text>
    <text x="380" y="386" font-size="120" fill="url(#title)">Membaca!</text>
  </g>

  <!-- Subtitle -->
  <text x="380" y="448" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-weight="600" font-size="34" fill="#475569">
    Huruf · Suku Kata · Kata · Kalimat
  </text>

  <!-- Footer pill -->
  <g transform="translate(380 500)">
    <rect x="0" y="0" width="430" height="58" rx="29" fill="#ffffff" opacity="0.85"/>
    <text x="28" y="38" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="700" font-size="24" fill="#334155">
      📚  Untuk anak Indonesia · Suara bahasa Indonesia
    </text>
  </g>
</svg>
