<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="Bita - Belajar Membaca">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <radialGradient id="body" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#fed7aa"/>
      <stop offset="60%"  stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
    <radialGradient id="ear" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="180" height="180" rx="40" ry="40" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <!-- Ears -->
    <ellipse cx="56"  cy="62" rx="17" ry="20" fill="url(#ear)"/>
    <ellipse cx="124" cy="62" rx="17" ry="20" fill="url(#ear)"/>
    <ellipse cx="56"  cy="66" rx="8" ry="11" fill="#f9a8d4"/>
    <ellipse cx="124" cy="66" rx="8" ry="11" fill="#f9a8d4"/>

    <!-- Body -->
    <ellipse cx="90" cy="106" rx="62" ry="58" fill="url(#body)"/>

    <!-- Cheeks -->
    <ellipse cx="51" cy="124" rx="11" ry="7" fill="#f9a8d4" opacity="0.85"/>
    <ellipse cx="129" cy="124" rx="11" ry="7" fill="#f9a8d4" opacity="0.85"/>

    <!-- Eyes — happy crescents -->
    <path d="M 62 100 Q 70 88 78 100"   stroke="#0f172a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 102 100 Q 110 88 118 100" stroke="#0f172a" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Mouth -->
    <path d="M 76 128 Q 90 142 104 128" stroke="#0f172a" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
